name: flutter_sweetie_app
publish_to: 'none'
description: Smoothies Sweetie native mobile app for owner and karyawan workflows, attendance, offline sales, and menu knowledge.
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  animations: ^2.0.11
  badges: ^3.1.2
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_chips_input:
    path: third_party/flutter_chips_input
  flutter_local_notifications: ^17.2.4
  flutter_screenutil: ^5.9.3
  flutter_staggered_grid_view: ^0.7.0
  geolocator: ^13.0.4
  google_fonts: ^6.3.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  modal_bottom_sheet: ^3.0.0
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/sweetie.png
    - assets/images/qr_smoothies.jpeg





